app:
  debug: false

llm:
  generator:
    provider: ollama
    model_source: streamlit_select
    base_url: http://localhost:11434
    max_concurrency: 1
    timeout_seconds: 120
  gemini:
    enabled: false
    api_key_env: GEMINI_API_KEY
  openrouter:
    enabled: false
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    model: openai/gpt-4.1-nano
    site_url:
    app_name: summary

eval:
  enabled: false
  mode: "off"

  ragas:
    enabled: false
    run_mode: offline_only
    judge:
      provider: gemini
      model: gemini-2.5-flash
      fallback_provider: ollama
      ollama_model:
      embeddings_provider: ollama
      ollama_embedding_model:
      max_workers: 1
      max_retries: 1
      timeout_seconds: 180
      max_wait_seconds: 60
      allow_external: false
    thresholds:
      faithfulness: 0.80
      context_precision: 0.70
      answer_relevancy: 0.75
      context_recall: 0.70

  deepeval:
    enabled: false
    judge:
      provider: gemini
      model: gemini-2.5-flash
      fallback_provider: ollama
      allow_external: false
      max_calls_per_run: 1
      combined_rubric: true
    thresholds:
      summary_quality: 0.80
      factuality: 0.85
      coverage: 0.75
      conciseness: 0.70
      relevance: 0.75
      format_correctness: 1.00

  behavior:
    fail_mode: warn
    fallback_response: "The summary did not pass the configured quality check."
    max_regenerate_attempts: 1
    max_retrieve_attempts: 1

rag:
  top_k: 5
  min_similarity: 0.72
  min_top_similarity: 0.72
  min_avg_similarity: 0.60
  min_context_count: 2
  max_duplicate_ratio: 0.35
  fallback_response: "I could not find enough reliable context in your library to answer this question."
  enable_auto_retrieve: false
  max_attempts: 1
  retry_strategies:
    - increase_top_k
  increase_top_k:
    increment: 3
    max_top_k: 15
  content_quality:
    enabled: true
    mode: downrank
    penalty: 0.2
    patterns:
      - "^\\s*table of contents\\b"
      - "^\\s*contents\\b"
      - "^\\s*praise for\\b"
      - "^\\s*copyright\\b"
      - "^\\s*index\\b"
      - "^\\s*references\\b"
      - "^\\s*bibliography\\b"
      - "^\\s*about the author\\b"
  keyword_search:
    provider: in_memory_bm25
    input_source: lancedb
    top_k: 20
    min_score:
    rebuild_on_startup: false
    cache_path: library/data/keyword_index
    max_chunks_for_in_memory: 50000
    fields:
      text_weight: 1.0
      title_weight: 2.0
      chapter_weight: 1.5
  hybrid_search:
    enabled: false
    vector_top_k: 20
    keyword_top_k: 20
    final_top_k: 8
    merge_strategy: rrf
    rrf_k: 60
    vector_weight: 1.0
    keyword_weight: 1.0
  reranker:
    enabled: false
    provider: local
    model: BAAI/bge-reranker-v2-m3
    device: auto
    input_top_n: 15
    final_top_k: 6
    max_pair_tokens: 512
    batch_size: 4
    min_rerank_score:
    fail_open: true
  enable_query_rewrite: false
  query_rewrite:
    provider: gemini
    fallback_provider: ollama
    trigger: retrieval_gate_failed
